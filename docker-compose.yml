version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: movie-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - movie_network # <-- Added
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$SA_PASSWORD\" -Q \"SELECT 1\" >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    container_name: movie-api
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=MovieDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      - db
    networks:
      - movie_network # <-- Added
    restart: unless-stopped

  proxy:
    image: nginx:latest
    container_name: movie-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
    depends_on:
      - api
    networks:
      - movie_network # <-- Added
    restart: unless-stopped

volumes:
  sql_data: {}

# 👇 Forces Podman to create a proper DNS phonebook 👇
networks:
  movie_network:
    driver: bridge
